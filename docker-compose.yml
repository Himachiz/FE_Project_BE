version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be-backend
    ports:
      - "5000:5000"
    env_file:
      - ./config/config.env
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
